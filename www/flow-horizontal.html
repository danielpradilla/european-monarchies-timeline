<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Horizontal Prototype</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body{font-family:Arial,Helvetica,sans-serif;margin:18px}
  .lane label{font-weight:700}
  .tooltip{position:absolute;padding:6px;border-radius:4px;background:#fff;border:1px solid #ccc;pointer-events:none;font-size:13px}
</style>
</head>
<body>
<h2>Horizontal flow prototype (grouped lanes)</h2>
<div id="chart"></div>
<script>
// Inline flows to avoid fetch issues on mobile
const flows = [
  { "id":"roman-west","label":"Roman Empire (W)", "region":"Italy", "start":-27, "end":476, "color":"#1f77b4" },
  { "id":"byzantine","label":"Byzantine Empire", "region":"Balkans", "start":330, "end":1453, "color":"#ff7f0e" },
  { "id":"england","label":"Kingdom of England", "region":"Britain", "start":927, "end":1707, "color":"#2ca02c" },
  { "id":"france","label":"Kingdom of France", "region":"Western Europe", "start":843, "end":1792, "color":"#d62728" },
  { "id":"hre","label":"Holy Roman Empire", "region":"Central Europe", "start":800, "end":1806, "color":"#9467bd" },
  { "id":"castile","label":"Crown of Castile", "region":"Iberia", "start":1230, "end":1715, "color":"#8c564b" }
];

const regions = Array.from(new Set(flows.map(d=>d.region)));
const width = Math.min(window.innerWidth-30, 1100), height = Math.max(500, regions.length*140);
const margin = {left:120, right:40, top:40, bottom:40};

const svg = d3.select('#chart').append('svg').attr('width', width).attr('height', height);

// time scale
const years = [d3.min(flows,d=>d.start), d3.max(flows,d=>d.end)];
const x = d3.scaleLinear().domain(years).range([margin.left, width-margin.right]);

// lanes by region (stacked vertically)
const laneHeight = Math.floor((height - margin.top - margin.bottom) / regions.length);

// axis
const xAxis = d3.axisTop(x).ticks(8).tickFormat(d=>d>0?d:d+' BC');
svg.append('g').attr('transform', `translate(0,${margin.top})`).call(xAxis);

// draw lanes
regions.forEach((r,i)=>{
  const y0 = margin.top + i*laneHeight + 20;
  svg.append('text').attr('x',10).attr('y', y0+12).text(r).style('font-weight','700');
  // lane separator
  svg.append('line').attr('x1', margin.left).attr('x2', width-margin.right).attr('y1', y0+laneHeight-30).attr('y2', y0+laneHeight-30).attr('stroke','#eee');
});

// tooltip
const tooltip = d3.select('body').append('div').attr('class','tooltip').style('display','none');

// draw flows as rounded rectangles per region lane
flows.forEach(f=>{
  const ri = regions.indexOf(f.region);
  const y0 = margin.top + ri*laneHeight + 30;
  const h = laneHeight - 60;
  const x1 = x(f.start);
  const x2 = x(f.end);
  const w = Math.max(6, x2-x1);
  const path = `M ${x1} ${y0} h ${w} q 6 0 6 6 v ${h-12} q 0 6 -6 6 h ${-w} q -6 0 -6 -6 v ${-h+12} q 0 -6 6 -6 Z`;
  svg.append('path').attr('d', path).attr('fill', f.color).attr('stroke','#333').attr('opacity',0.95)
    .on('mouseover',(e)=>{ tooltip.style('display','block').html(`<b>${f.label}</b><br>${f.start} → ${f.end}`); })
    .on('mousemove',(e)=>{ tooltip.style('left', (e.pageX+12)+'px').style('top', (e.pageY+12)+'px'); })
    .on('mouseout',()=>{ tooltip.style('display','none'); });
  svg.append('text').attr('x', x1 + 8).attr('y', y0 + 18).text(f.label).style('font-weight','600');
});
</script>
</body>
</html>
