<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="2000" viewBox="0 0 1200 2000">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#1f77b4" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#6ea7e6" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff7f0e" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#ffb07a" stop-opacity="0.98"/>
    </linearGradient>
  </defs>
  <style>
    text{font-family: 'Source Sans Pro', Arial, sans-serif; fill:#222}
    .title{font-weight:700; font-size:20px}
    .label{font-weight:600; font-size:13px}
    .small{font-size:11px; fill:#333}
  </style>
  <rect x="0" y="0" width="1200" height="2000" fill="#fbfbfb"/>

  <!-- column guides -->
  <g transform="translate(120,60)">

    <!-- subtle vertical separators -->
    <g stroke="#eee">
      <line x1="220" x2="220" y1="0" y2="1840"/>
      <line x1="440" x2="440" y1="0" y2="1840"/>
      <line x1="660" x2="660" y1="0" y2="1840"/>
      <line x1="880" x2="880" y1="0" y2="1840"/>
    </g>

    <!-- nicer Roman -> Byzantine flow -->
    <path d="M40,20 C120,110 120,200 40,300 L120,300 C200,200 200,110 120,20 Z" fill="url(#g1)" stroke="#2b5f99" stroke-width="1" opacity="0.95"/>
    <path d="M120,300 C160,360 200,520 200,700 C200,880 120,980 40,1040 L120,1040 C200,980 280,880 280,700 C280,520 240,360 200,300 Z" fill="url(#g2)" stroke="#c66b21" stroke-width="1" opacity="0.95"/>
    <text x="46" y="36" class="label">Roman Empire (Western)</text>
    <text x="206" y="316" class="label">Byzantine Empire</text>

    <!-- England flow (soft ribbon) -->
    <path d="M260,420 C360,480 360,760 260,840 L340,840 C440,760 440,480 340,420 Z" fill="#7fc97f" stroke="#2e8b3a" stroke-width="1" opacity="0.95"/>
    <text x="280" y="400" class="label">Kingdom of England</text>

    <!-- France flow -->
    <path d="M480,360 C580,420 580,820 480,900 L560,900 C660,820 660,420 560,360 Z" fill="#f46d6d" stroke="#b33a3a" stroke-width="1" opacity="0.95"/>
    <text x="500" y="340" class="label">Kingdom of France</text>

    <!-- Holy Roman flow -->
    <path d="M700,280 C780,360 780,820 700,920 L780,920 C860,820 860,360 780,280 Z" fill="#c7a0e6" stroke="#8b5fb3" stroke-width="1" opacity="0.95"/>
    <text x="720" y="260" class="label">Holy Roman Empire</text>

    <!-- Iberia flow -->
    <path d="M920,1040 C980,1100 980,1460 920,1520 L1000,1520 C1060,1460 1060,1100 1000,1040 Z" fill="#b58b6a" stroke="#7a5840" stroke-width="1" opacity="0.95"/>
    <text x="940" y="1020" class="label">Crown of Castile</text>

    <!-- timeline axis left -->
    <g transform="translate(-40,0)">
      <line x1="0" x2="0" y1="0" y2="1840" stroke="#333" stroke-width="2"/>
      <text x="-10" y="0" class="small">27 BC</text>
      <text x="-10" y="460" class="small">500</text>
      <text x="-10" y="920" class="small">1000</text>
      <text x="-10" y="1380" class="small">1500</text>
      <text x="-10" y="1840" class="small">2000</text>
    </g>

    <!-- legend -->
    <g transform="translate(980,20)">
      <text class="label">Legend</text>
      <g transform="translate(0,22)">
        <rect x="0" y="4" width="18" height="12" fill="#1f77b4" stroke="#333"/>
        <text x="26" y="16" class="small">Roman Empire (Western)</text>
      </g>
      <g transform="translate(0,40)">
        <rect x="0" y="4" width="18" height="12" fill="#ff7f0e" stroke="#333"/>
        <text x="26" y="16" class="small">Byzantine Empire</text>
      </g>
      <g transform="translate(0,58)">
        <rect x="0" y="4" width="18" height="12" fill="#7fc97f" stroke="#333"/>
        <text x="26" y="16" class="small">Kingdom of England</text>
      </g>
    </g>

  </g>
</svg>